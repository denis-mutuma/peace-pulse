name: Deploy EC2

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.EC2_HOST != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/peacepulse
          chmod 600 ~/.ssh/peacepulse
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/peacepulse" ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/peacepulse/app/"
          ssh -i ~/.ssh/peacepulse "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "cd /opt/peacepulse/app && docker compose -f infra/docker-compose.yml up -d --build"
      - name: Verify health
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error "http://${{ secrets.EC2_HOST }}:8080/api/health"; then
              exit 0
            fi
            sleep 5
          done
          exit 1
