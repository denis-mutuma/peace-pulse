services:
  api:
    build:
      context: ..
      dockerfile: infra/python.Dockerfile
    command: uv run python -m services.api_prod.main
    environment:
      PEACEPULSE_ENV: production
      PEACEPULSE_DATABASE_URL: sqlite:////app/data/peacepulse-prod.db
      PEACEPULSE_JWT_SECRET: ${PEACEPULSE_JWT_SECRET:-change-this-secret-before-production}
      PEACEPULSE_BOOTSTRAP_TOKEN: ${PEACEPULSE_BOOTSTRAP_TOKEN:-}
      PEACEPULSE_EVIDENCE_STORAGE_DIR: /app/data/storage/evidence-prod
      PEACEPULSE_S3_ENDPOINT_URL: ${PEACEPULSE_S3_ENDPOINT_URL:-}
      PEACEPULSE_S3_BUCKET: ${PEACEPULSE_S3_BUCKET:-peacepulse-evidence}
      PEACEPULSE_S3_REGION: ${PEACEPULSE_S3_REGION:-}
      PEACEPULSE_S3_ACCESS_KEY_ID: ${PEACEPULSE_S3_ACCESS_KEY_ID:-}
      PEACEPULSE_S3_SECRET_ACCESS_KEY: ${PEACEPULSE_S3_SECRET_ACCESS_KEY:-}
      PEACEPULSE_S3_SESSION_TOKEN: ${PEACEPULSE_S3_SESSION_TOKEN:-}
      PEACEPULSE_S3_FORCE_PATH_STYLE: ${PEACEPULSE_S3_FORCE_PATH_STYLE:-true}
      PEACEPULSE_S3_PRESIGN_EXPIRES_SECONDS: ${PEACEPULSE_S3_PRESIGN_EXPIRES_SECONDS:-900}
    ports:
      - "8080:8080"
    volumes:
      - ../data:/app/data
