services:
  api:
    build:
      context: ..
      dockerfile: infra/python.Dockerfile
    command: uv run python services/api/server.py
    ports:
      - "8080:8080"
    volumes:
      - ../data:/app/data

  worker:
    build:
      context: ..
      dockerfile: infra/python.Dockerfile
    command: uv run python services/worker/worker.py
    volumes:
      - ../data:/app/data
    depends_on:
      - api

  sensor-sim:
    build:
      context: ..
      dockerfile: infra/python.Dockerfile
    command: uv run python services/sensor-sim/sensor_sim.py
    volumes:
      - ../data:/app/data
    depends_on:
      - api
