<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#153d36" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>PeacePulse Hub</title>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Local edge hub</p>
        <h1>PeacePulse Hub</h1>
      </div>
      <div class="connection">
        <span id="apiStatus">Checking hub...</span>
        <button id="offlineToggle" type="button">Go offline</button>
      </div>
    </header>

    <main class="layout">
      <nav class="tabs" aria-label="Primary views">
        <button class="tab active" data-view="report">Report</button>
        <button class="tab" data-view="dashboard">Dashboard</button>
      </nav>

      <section id="report" class="view active">
        <div class="panel">
          <h2>Anonymous Report</h2>
          <form id="reportForm" class="form">
            <label>Language
              <select name="language">
                <option value="en">English</option>
                <option value="sw">Swahili</option>
                <option value="fr">French</option>
                <option value="ar">Arabic</option>
              </select>
            </label>
            <label>Rough location
              <input name="rough_location" value="North water point" />
            </label>
            <label>Concern type
              <select name="category_hint">
                <option value="resource">Resource dispute</option>
                <option value="threat">Threat or intimidation</option>
                <option value="corruption">Corruption or abuse</option>
                <option value="rumor">Harmful rumor</option>
                <option value="unsafe_route">Unsafe route</option>
                <option value="work_exploitation">Work exploitation</option>
              </select>
            </label>
            <label class="wide">What happened?
              <textarea name="text" rows="5" minlength="8" maxlength="2000" required>There is tension at the main water point because some families are being turned away.</textarea>
            </label>
            <p id="textCount" class="counter wide">0 / 2000 characters</p>
            <p class="notice wide">Avoid names, exact homes, phone numbers, or details that could expose someone.</p>
            <button type="submit">Submit report</button>
          </form>
        </div>
        <div class="panel">
          <h2>Offline Queue</h2>
          <p id="queueCount" class="metric">0 pending browser items</p>
          <button id="flushQueue" type="button">Flush queue</button>
          <div id="reportResult" class="result"></div>
        </div>
      </section>

      <section id="dashboard" class="view">
        <div class="sectionHeader">
          <h2>Responder Dashboard</h2>
          <button id="refreshDashboard" type="button">Refresh</button>
        </div>
        <div class="filters" aria-label="Incident filters">
          <label>Status
            <select id="statusFilter">
              <option value="">Any status</option>
              <option value="new">New</option>
              <option value="assigned">Assigned</option>
              <option value="in_progress">In progress</option>
              <option value="resolved">Resolved</option>
            </select>
          </label>
          <label>Category
            <select id="categoryFilter">
              <option value="">Any category</option>
              <option value="resource">Resource dispute</option>
              <option value="threat">Threat or intimidation</option>
              <option value="corruption">Corruption or abuse</option>
              <option value="service_denial">Service denial</option>
              <option value="rumor">Harmful rumor</option>
              <option value="unsafe_route">Unsafe route</option>
              <option value="work_exploitation">Work exploitation</option>
              <option value="other">Other</option>
            </select>
          </label>
          <label>Minimum severity
            <select id="severityFilter">
              <option value="1">1+</option>
              <option value="2">2+</option>
              <option value="3">3+</option>
              <option value="4">4+</option>
              <option value="5">5</option>
            </select>
          </label>
        </div>
        <div id="dashboardResult" class="result" role="status"></div>
        <div id="incidentGrid" class="grid"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
